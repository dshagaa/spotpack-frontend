<!DOCTYPE html>
<html lang="es" class="bg-bg text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotPack</title>
  <link rel="stylesheet" href="/src/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script type="module">
    import apiKey from '/src/components/api-key.js';
    import eventList from '/src/components/event-list.js';
    document.addEventListener('alpine:init', () => {
      Alpine.data('apiKey', apiKey);
      Alpine.data('eventList', eventList);
    });
  </script>
</head>
<body x-data class="min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-primary">🦁 SpotPack</h1>
      <!-- API Key -->
      <div x-data="apiKey" class="flex items-center gap-2">
        <template x-if="!saved">
          <button @click="toggle"
            class="bg-primary hover:bg-orange-600 text-white px-3 py-1 rounded text-sm font-medium">
            ⚡ Conectar API
          </button>
        </template>
        <template x-if="saved && !showInput">
          <div class="flex items-center gap-2">
            <span class="text-success text-sm">● Conectado</span>
            <button @click="toggle"
              class="text-gray-400 hover:text-white text-xs underline">cambiar</button>
          </div>
        </template>
        <template x-if="showInput">
          <div class="flex items-center gap-2">
            <input x-model="key" type="password" placeholder="sk-sp-..."
              class="bg-surface border border-gray-600 rounded px-2 py-1 text-sm w-48 focus:border-primary outline-none"
              @keyup.enter="save()" />
            <button @click="save"
              class="bg-primary hover:bg-orange-600 text-white px-2 py-1 rounded text-sm">Guardar</button>
            <button @click="toggle"
              class="text-gray-400 hover:text-white text-sm">✕</button>
          </div>
        </template>
      </div>
    </div>

    <!-- Event list -->
    <div x-data="eventList" x-show="!loading">
      <!-- Loading -->
      <div x-show="loading" class="text-center text-gray-500 mt-20">
        <p class="text-lg">Cargando eventos...</p>
      </div>
      <!-- Error -->
      <div x-show="error" class="text-center text-danger mt-20">
        <p class="text-lg" x-text="error"></p>
      </div>
      <!-- Event cards -->
      <div x-show="events.length > 0" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <template x-for="e in events" :key="e.id">
          <a :href="`#/event/${e.id}`"
            class="block bg-surface rounded-lg p-5 border border-gray-700 hover:border-primary transition-colors">
            <h2 class="text-lg font-semibold text-white" x-text="e.name"></h2>
            <p class="text-sm text-gray-400 mt-1" x-text="dateRange(e)"></p>
            <p class="text-sm text-gray-500 mt-1" x-show="e.location" x-text="e.location"></p>
            <span class="inline-block mt-3 text-xs bg-primary/20 text-primary px-2 py-0.5 rounded"
              x-text="e.item_count + ' items'"></span>
          </a>
        </template>
      </div>
      <!-- Empty state -->
      <div x-show="events.length === 0" class="text-center text-gray-500 mt-20">
        <p class="text-lg">No hay eventos todavía</p>
        <p class="text-sm mt-2">Creá uno para empezar</p>
      </div>
    </div>
  </div>
</body>
</html>
