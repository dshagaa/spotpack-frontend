<!DOCTYPE html>
<html lang="es" class="bg-bg text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotPack</title>
  <link rel="stylesheet" href="/src/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script type="module">
    import '/src/store.js';
    import apiKey from '/src/components/api-key.js';
    import eventList from '/src/components/event-list.js';
    import createEvent from '/src/components/create-event.js';
    import eventDetail from '/src/components/event-detail.js';
    import importModal from '/src/components/import-modal.js';
    document.addEventListener('alpine:init', () => {
      Alpine.data('apiKey', apiKey);
      Alpine.data('eventList', eventList);
      Alpine.data('createEvent', createEvent);
      Alpine.data('eventDetail', eventDetail);
      Alpine.data('importModal', importModal);
    });
  </script>
</head>
<body x-data="{ page: location.hash.startsWith('#/event/') ? 'detail' : 'list' }"
  @hashchange.window="page = location.hash.startsWith('#/event/') ? 'detail' : 'list'"
  class="min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-primary">🦁 SpotPack</h1>
      <!-- API Key -->
      <div x-data="apiKey" class="flex items-center gap-2">
        <template x-if="!saved">
          <button @click="toggle"
            class="bg-primary hover:bg-orange-600 text-white px-3 py-1 rounded text-sm font-medium">
            ⚡ Conectar API
          </button>
        </template>
        <template x-if="saved && !showInput">
          <div class="flex items-center gap-2">
            <span class="text-success text-sm">● Conectado</span>
            <button @click="toggle"
              class="text-gray-400 hover:text-white text-xs underline">cambiar</button>
          </div>
        </template>
        <template x-if="showInput">
          <div class="flex items-center gap-2">
            <input x-model="key" type="password" placeholder="sk-sp-..."
              class="bg-surface border border-gray-600 rounded px-2 py-1 text-sm w-48 focus:border-primary outline-none"
              @keyup.enter="save()" />
            <button @click="save"
              class="bg-primary hover:bg-orange-600 text-white px-2 py-1 rounded text-sm">Guardar</button>
            <button @click="toggle"
              class="text-gray-400 hover:text-white text-sm">✕</button>
          </div>
        </template>
      </div>
    </div>

    <!-- Event list -->
    <div x-data="eventList" x-show="page === 'list'">
      <!-- Actions -->
      <div class="flex justify-end mb-4">
        <button @click="$dispatch('open-create-modal')"
          class="bg-primary hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
          ＋ Crear evento
        </button>
      </div>
      <!-- Loading -->
      <div x-show="loading" class="text-center text-gray-500 mt-20">
        <p class="text-lg">Cargando eventos...</p>
      </div>
      <!-- Error -->
      <div x-show="error" class="text-center text-danger mt-20">
        <p class="text-lg" x-text="error"></p>
      </div>
      <!-- Event cards -->
      <div x-show="events.length > 0" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <template x-for="e in events" :key="e.id">
          <a :href="`#/event/${e.id}`"
            class="block bg-surface rounded-lg p-5 border border-gray-700 hover:border-primary transition-colors">
            <h2 class="text-lg font-semibold text-white" x-text="e.name"></h2>
            <p class="text-sm text-gray-400 mt-1" x-text="dateRange(e)"></p>
            <p class="text-sm text-gray-500 mt-1" x-show="e.location" x-text="e.location"></p>
            <span class="inline-block mt-3 text-xs bg-primary/20 text-primary px-2 py-0.5 rounded"
              x-text="e.item_count + ' items'"></span>
          </a>
        </template>
      </div>
      <!-- Empty state -->
      <div x-show="events.length === 0" class="text-center text-gray-500 mt-20">
        <p class="text-lg">No hay eventos todavía</p>
        <p class="text-sm mt-2">Creá uno para empezar</p>
      </div>
    </div>

    <!-- Event Detail -->
    <div x-data="eventDetail" x-show="page === 'detail'">
      <div x-show="loading" class="text-center text-gray-500 mt-20">
        <p class="text-lg">Cargando evento...</p>
      </div>
      <div x-show="error" class="text-center text-danger mt-20">
        <p class="text-lg" x-text="error"></p>
        <a href="#/" class="text-primary text-sm mt-4 inline-block">← Volver</a>
      </div>
      <template x-if="event">
        <div>
          <a href="#/" class="text-primary text-sm mb-4 inline-block">← Eventos</a>
          <h1 class="text-2xl font-bold text-white mt-2" x-text="event.name"></h1>
          <p class="text-sm text-gray-400 mt-1" x-show="event.location" x-text="event.location"></p>
          <!-- Action buttons -->
          <div class="flex flex-wrap gap-2 mt-4">
            <button @click="$dispatch('open-import-modal', event.id)"
              class="bg-primary hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
              📸 Importar schedule
            </button>
            <button @click="editEvent()"
              class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
              ✏️ Editar
            </button>
            <button @click="showDeleteConfirm = true"
              class="bg-danger/20 hover:bg-danger/30 text-danger px-4 py-2 rounded-lg text-sm font-medium">
              🗑️ Eliminar
            </button>
          </div>
          <!-- Delete confirmation -->
          <div x-show="showDeleteConfirm"
            class="mt-4 bg-surface border border-danger/50 rounded-lg p-4">
            <p class="text-white text-sm">¿Estás seguro de eliminar este evento y todos sus items?</p>
            <div class="flex gap-2 mt-3">
              <button @click="confirmDelete()" :disabled="deleting"
                class="bg-danger hover:bg-red-700 disabled:opacity-50 text-white px-3 py-1 rounded text-sm">
                <span x-show="!deleting">Sí, eliminar</span>
                <span x-show="deleting">Eliminando...</span>
              </button>
              <button @click="cancelDelete()"
                class="bg-gray-600 hover:bg-gray-500 text-white px-3 py-1 rounded text-sm">
                Cancelar
              </button>
            </div>
          </div>
          <!-- Days -->
          <template x-for="day in days" :key="day.date">
            <div class="mt-6">
              <h2 class="text-lg font-semibold text-primary sticky top-0 bg-bg py-2"
                x-text="formatDate(day.date)"></h2>
              <div class="space-y-2 mt-2">
                <template x-for="item in day.items" :key="item.id">
                  <div class="bg-surface rounded-lg p-4 border border-gray-700">
                    <div class="flex items-start justify-between gap-3">
                      <div class="flex-1">
                        <p class="text-white font-medium" x-text="item.title"></p>
                        <p class="text-xs text-gray-400 mt-1" x-show="item.description" x-text="item.description"></p>
                        <div class="flex flex-wrap gap-2 mt-2">
                          <span class="text-xs bg-gray-700 text-gray-300 px-2 py-0.5 rounded"
                            x-text="formatTime(item.start_time) + ' – ' + formatTime(item.end_time)"></span>
                          <span class="text-xs bg-gray-700 text-gray-300 px-2 py-0.5 rounded"
                            x-text="item.room" x-show="item.room"></span>
                          <span class="text-xs px-2 py-0.5 rounded" :class="badgeClass(item.classification)"
                            x-text="item.classification"></span>
                        </div>
                      </div>
                      <span class="text-sm" x-text="categoryIcon(item.category)"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- Create / Edit Event Modal -->
  <div x-data="createEvent"
    @keydown.escape.window="open = false"
    x-show="open"
    x-transition
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/60">
    <div class="bg-surface rounded-xl p-6 w-full max-w-md mx-4 border border-gray-700" @click.stop>
      <h2 class="text-xl font-bold text-white mb-4">
        <span x-show="!isEdit">Nuevo evento</span>
        <span x-show="isEdit">Editar evento</span>
      </h2>
      <form @submit.prevent="submit">
        <input x-model="name" placeholder="Nombre del evento *" required
          class="w-full bg-bg border border-gray-600 rounded px-3 py-2 mb-3 text-white text-sm focus:border-primary outline-none" />
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="text-xs text-gray-400">Fecha inicio *</label>
            <input x-model="startDate" type="date" required
              class="w-full bg-bg border border-gray-600 rounded px-3 py-2 text-white text-sm focus:border-primary outline-none mt-1" />
          </div>
          <div>
            <label class="text-xs text-gray-400">Fecha fin *</label>
            <input x-model="endDate" type="date" required
              class="w-full bg-bg border border-gray-600 rounded px-3 py-2 text-white text-sm focus:border-primary outline-none mt-1" />
          </div>
        </div>
        <input x-model="location" placeholder="Lugar (opcional)"
          class="w-full bg-bg border border-gray-600 rounded px-3 py-2 mb-4 text-white text-sm focus:border-primary outline-none" />
        <div x-show="error" class="text-danger text-sm mb-3" x-text="error"></div>
        <div x-show="success" class="text-success text-sm mb-3">
          <span x-show="!isEdit">✅ Creado!</span>
          <span x-show="isEdit">✅ Guardado!</span>
        </div>
        <div class="flex gap-3 justify-end">
          <button type="button" @click="open = false; reset()"
            class="px-4 py-2 text-sm text-gray-400 hover:text-white">Cancelar</button>
          <button type="submit" :disabled="loading"
            class="bg-primary hover:bg-orange-600 disabled:opacity-50 text-white px-4 py-2 rounded-lg text-sm font-medium">
            <span x-show="!loading && !isEdit">Crear</span>
            <span x-show="!loading && isEdit">Guardar</span>
            <span x-show="loading">Guardando...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Import Schedule Modal -->
  <div x-data="importModal"
    @keydown.escape.window="open = false"
    x-show="open"
    x-transition
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/60">
    <div class="bg-surface rounded-xl p-6 w-full max-w-md mx-4 border border-gray-700" @click.stop>
      <h2 class="text-xl font-bold text-white mb-4">📸 Importar schedule</h2>
      <template x-if="!result">
        <div>
          <input type="file" accept="image/png,image/jpeg,image/webp"
            @change="handleFile($el)"
            class="w-full text-sm text-gray-400 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-primary file:text-white file:text-sm file:font-medium" />
          <img :src="preview" x-show="preview" class="mt-4 rounded-lg max-h-48 object-contain mx-auto" />
          <div x-show="error" class="text-danger text-sm mt-3" x-text="error"></div>
          <div class="flex gap-3 justify-end mt-4">
            <button @click="open = false; reset()"
              class="px-4 py-2 text-sm text-gray-400 hover:text-white">Cancelar</button>
            <button @click="submit" :disabled="!file || loading"
              class="bg-primary hover:bg-orange-600 disabled:opacity-50 text-white px-4 py-2 rounded-lg text-sm font-medium">
              <span x-show="!loading">🤖 Enviar a MiMo</span>
              <span x-show="loading">Procesando...</span>
            </button>
          </div>
        </div>
      </template>
      <template x-if="result">
        <div class="text-center">
          <p class="text-success text-lg">✅ Importado!</p>
          <p class="text-white mt-2"><span x-text="result.count"></span> items añadidos</p>
          <button @click="close()"
            class="mt-4 bg-primary hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
            Cerrar
          </button>
        </div>
      </template>
    </div>
  </div>
</body>
</html>
