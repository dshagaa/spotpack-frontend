name: Code Quality Review

on:
  push:
    branches: ['**', '!main', '!dev']
  pull_request:
    branches: ['**', '!main', '!dev']

jobs:
  review:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
